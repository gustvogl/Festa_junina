<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Arraiá Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #FDF1E7; }
        .sidebar { background-color: #F8E3D6; border-right: 4px solid #F6B84F; }
        .active-link { background-color: #FCE6DA; color: #B33030; }
        .profile-card { background-color: #FCEBDD; border: 1px solid #E8CDBE; }
        .level-badge { color: #1E7E8E; font-weight: 600; }
        .main-button { background-color: #B33030; transition: transform 0.2s; }
        .main-button:hover { transform: scale(1.02); background-color: #8C2424; }
    </style>
</head>
<body class="min-h-screen flex">

    <aside class="w-64 sidebar min-h-screen p-6 hidden md:flex flex-col">
        <h1 class="text-3xl font-bold text-red-700 mb-8 leading-tight">Arraiá<br>Digital</h1>
        
        <div class="profile-card p-4 rounded-xl mb-8 flex items-center gap-3">
            <div class="w-10 h-10 bg-amber-800 rounded-full flex items-center justify-center text-white">
                <i class="fas fa-user-cowboy"></i>
            </div>
            <div>
                <p class="font-bold text-gray-800 text-sm">Gustavinho</p>
                <p class="text-xs text-gray-600">32 Fichas</p>
                <p class="text-[10px] level-badge">Nível: Caipira Iniciante</p>
            </div>
        </div>

        <nav class="flex flex-col gap-4 font-body-lg text-body-lg">
            <a class="flex items-center gap-4 p-3 text-on-surface-variant hover:bg-primary-fixed hover:text-on-primary-fixed-variant transition-transform hover:translate-x-2 rounded-full"
                href="inicio.html">
                <span class="material-symbols-outlined" data-icon="home"
                    style="font-variation-settings: 'FILL' 1;">home</span>
                Início
            </a>
            <a class="flex items-center gap-4 p-3 text-primary font-bold bg-surface-variant rounded-full hover:bg-primary-fixed hover:text-on-primary-fixed-variant transition-transform hover:translate-x-2"
                href="perfil.html">
                <span class="material-symbols-outlined" data-icon="person">person</span>
                Meu Perfil
            </a>
            <a class="flex items-center gap-4 p-3 text-on-surface-variant hover:bg-primary-fixed hover:text-on-primary-fixed-variant transition-transform hover:translate-x-2 rounded-full"
                href="comida.html">
                <span class="material-symbols-outlined" data-icon="restaurant">restaurant</span>
                Comida
            </a>
            <a class="flex items-center gap-4 p-3 text-on-surface-variant hover:bg-primary-fixed hover:text-on-primary-fixed-variant transition-transform hover:translate-x-2 rounded-full"
                href="correio.html">
                <span class="material-symbols-outlined" data-icon="mail">mail</span>
                Correio
            </a>
            <a class="flex items-center gap-4 p-3 text-on-surface-variant hover:bg-primary-fixed hover:text-on-primary-fixed-variant transition-transform hover:translate-x-2 rounded-full"
                href="jogos.html">
                <span class="material-symbols-outlined" data-icon="storefront">storefront</span>
                Barracas
            </a>
            <div class="mt-8 pt-8 border-t-2 border-outline-variant flex flex-col gap-4">
                <a class="flex items-center gap-4 p-3 text-on-surface-variant hover:bg-primary-fixed hover:text-on-primary-fixed-variant transition-transform hover:translate-x-2 rounded-full"
                    href="shows.html">
                    <span class="material-symbols-outlined" data-icon="event">event</span>
                    Shows
                </a>
                <a class="flex items-center gap-4 p-3 text-on-surface-variant hover:bg-primary-fixed hover:text-on-primary-fixed-variant transition-transform hover:translate-x-2 rounded-full"
                    href="vidente.html">
                    <span class="material-symbols-outlined" data-icon="psychology">psychology</span>
                    Vidente
                </a>
                <a class="flex items-center gap-4 p-3 text-on-surface-variant hover:bg-primary-fixed hover:text-on-primary-fixed-variant transition-transform hover:translate-x-2 rounded-full"
                    href="prisao.html">
                    <span class="material-symbols-outlined" data-icon="security">security</span>
                    Prisão
                </a>
            </div>
        </nav>
    </aside>

    <main class="flex-1 p-4 md:p-10 relative">
        <div class="absolute top-0 left-0 w-full flex justify-center gap-2 overflow-hidden opacity-80 pointer-events-none">
            <div class="w-8 h-10 bg-red-400" style="clip-path: polygon(0% 0%, 100% 0%, 50% 100%);"></div>
            <div class="w-8 h-10 bg-yellow-400" style="clip-path: polygon(0% 0%, 100% 0%, 50% 100%);"></div>
            <div class="w-8 h-10 bg-blue-400" style="clip-path: polygon(0% 0%, 100% 0%, 50% 100%);"></div>
            <div class="w-8 h-10 bg-red-400" style="clip-path: polygon(0% 0%, 100% 0%, 50% 100%);"></div>
        </div>

        <div class="max-w-2xl mx-auto mt-12">
            <div class="flex items-center gap-4 mb-8">
                <div class="h-1 bg-red-700 flex-1 rounded-full"></div>
                <h2 class="text-3xl font-bold text-red-800 text-center uppercase tracking-tight">Meu Perfil</h2>
                <div class="h-1 bg-red-700 flex-1 rounded-full"></div>
            </div>

            <div class="bg-white rounded-3xl shadow-xl shadow-orange-200/50 overflow-hidden border border-orange-100">
                <div class="bg-red-700 p-6 text-white text-center">
                    <div class="w-24 h-24 bg-white rounded-full mx-auto mb-4 border-4 border-orange-200 flex items-center justify-center overflow-hidden">
                         <i class="fas fa-user-circle text-6xl text-orange-200"></i>
                    </div>
                    <h3 id="profile-name-header" class="text-xl font-bold">Gustavinho</h3>
                </div>

                <div class="p-8 space-y-6">
                    <div class="flex items-center gap-4 border-b border-orange-50 pb-4">
                        <i class="fas fa-id-card text-orange-400 w-6"></i>
                        <div>
                            <label class="block text-[10px] uppercase font-bold text-gray-400">Nome Completo</label>
                            <p id="profile-name" class="text-gray-800 font-semibold">Carregando...</p>
                        </div>
                    </div>

                    <div class="flex items-center gap-4 border-b border-orange-50 pb-4">
                        <i class="fas fa-envelope text-orange-400 w-6"></i>
                        <div>
                            <label class="block text-[10px] uppercase font-bold text-gray-400">E-mail de Contato</label>
                            <p id="profile-email" class="text-gray-800 font-semibold">Carregando...</p>
                        </div>
                    </div>

                    <div class="flex items-center gap-4 border-b border-orange-50 pb-4">
                        <i class="fas fa-coins text-orange-400 w-6"></i>
                        <div>
                            <label class="block text-[10px] uppercase font-bold text-gray-400">Fichas Acumuladas</label>
                            <p id="profile-tokens" class="text-2xl font-bold text-red-700">Carregando...</p>
                        </div>
                    </div>

                    <button id="edit-profile-btn" class="main-button text-white font-bold py-4 rounded-2xl w-full shadow-lg shadow-red-200 uppercase tracking-widest text-sm">
                        Editar Perfil
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
