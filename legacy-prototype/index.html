<!DOCTYPE html>

<html class="light" lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>O Registro do Caipira</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link

        rel="stylesheet" />
    <!-- Material Symbols -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Tailwind Config -->
    <script id="tailwind-config">

                extend: {
                    "colors": {
                        "on-secondary-container": "#6b4b00",
                        "on-secondary": "#ffffff",
                        "tertiary": "#00657a",
                        "on-primary-fixed": "#410007",
                        "inverse-on-surface": "#ffede2",
                        "primary-container": "#db313f",
                        "secondary-container": "#ffb702",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a",
                        "outline": "#8f6f6e",
                        "surface-container-low": "#fff1e9",
                        "background": "#fff8f5",
                        "secondary-fixed": "#ffdea9",
                        "on-tertiary-fixed": "#001f27",
                        "tertiary-container": "#007f99",
                        "on-surface": "#28180b",
                        "on-background": "#28180b",
                        "surface-container-highest": "#fbddc7",
                        "surface-variant": "#fbddc7",
                        "on-tertiary-container": "#fafdff",
                        "primary": "#b7102a",
                        "error": "#ba1a1a",
                        "on-primary": "#ffffff",
                        "secondary": "#7d5800",
                        "inverse-surface": "#3f2d1e",
                        "on-primary-container": "#fffbff",
                        "surface": "#fff8f5",
                        "on-tertiary-fixed-variant": "#004e5f",
                        "secondary-fixed-dim": "#ffba27",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "tertiary-fixed": "#b2ebff",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed-variant": "#92001c",
                        "primary-fixed-dim": "#ffb3b1",
                        "surface-container": "#ffeadc",
                        "primary-fixed": "#ffdad8",
                        "on-secondary-fixed-variant": "#5e4100",
                        "surface-tint": "#bb152c",
                        "surface-container-high": "#ffe3cf",
                        "on-secondary-fixed": "#271900",
                        "surface-dim": "#f2d4bf",
                        "on-surface-variant": "#5b403f",
                        "inverse-primary": "#ffb3b1",

                        "surface-bright": "#fff8f5",

                    "borderRadius": {

                        "xl": "0.75rem",
                        "full": "9999px"

                    "spacing": {
                        "gutter": "24px",
                        "unit": "8px",
                        "container-max": "1200px",
                        "margin-edge": "32px"
                    },
                    "fontFamily": {
                        "body-lg": ["Be Vietnam Pro"],
                        "headline-lg": ["Bricolage Grotesque"],
                        "body-md": ["Be Vietnam Pro"],
                        "headline-xl": ["Bricolage Grotesque"],
                        "label-caps": ["Be Vietnam Pro"],
                        "headline-md": ["Bricolage Grotesque"]

    <style>
        /* Organic texture overlay for the background */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: -1;
        }

        /* Wood plank gradient for buttons */
        .wood-plank {
            background: linear-gradient(180deg, theme('colors.inverse-surface') 0%, #2a1b11 100%);
        }

        /* Chita pattern overlay for headers */
        .chita-pattern {
            background-color: theme('colors.primary');
            background-image: radial-gradient(circle at 10px 10px, theme('colors.secondary-container') 4px, transparent 4px),
                radial-gradient(circle at 25px 25px, theme('colors.tertiary-container') 5px, transparent 5px),
                radial-gradient(circle at 40px 10px, theme('colors.surface-container') 3px, transparent 3px);
            background-size: 50px 50px;
        }

        /* Hide scrollbar for avatar selection */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-gutter relative font-body-md">
    <!-- Bunting (Bandeirinhas) Top Decoration -->
    <div aria-hidden="true"
        class="absolute top-0 left-0 w-full overflow-hidden leading-none h-16 flex pointer-events-none z-10">
        <svg class="w-full h-full" fill="none" preserveaspectratio="none" viewbox="0 0 1000 100"
            xmlns="http://www.w3.org/2000/svg">
            <!-- Jute Rope -->
            <path d="M0 10 Q 250 30 500 10 T 1000 10" fill="none" stroke="#5b403f" stroke-dasharray="4 2"
                stroke-width="2"></path>
            <!-- Flags -->
            <polygon class="fill-primary drop-shadow-md" points="20,12 80,15 50,80"></polygon>
            <polygon class="fill-secondary drop-shadow-md" points="120,18 180,12 150,75"></polygon>
            <polygon class="fill-tertiary drop-shadow-md" points="220,10 280,18 250,85"></polygon>
            <polygon class="fill-secondary-container drop-shadow-md" points="320,15 380,10 350,70"></polygon>
            <polygon class="fill-primary drop-shadow-md" points="420,12 480,18 450,80"></polygon>
            <polygon class="fill-tertiary drop-shadow-md" points="520,18 580,12 550,75"></polygon>
            <polygon class="fill-secondary drop-shadow-md" points="620,10 680,18 650,85"></polygon>
            <polygon class="fill-primary drop-shadow-md" points="720,15 780,10 750,70"></polygon>
            <polygon class="fill-secondary-container drop-shadow-md" points="820,12 880,18 850,80"></polygon>
            <polygon class="fill-tertiary drop-shadow-md" points="920,18 980,12 950,75"></polygon>
        </svg>
    </div>
    <!-- Main Registration Card -->
    <main
        class="w-full max-w-[500px] mt-margin-edge bg-surface-container rounded-xl border-4 border-outline shadow-[8px_8px_0px_0px_rgba(74,55,40,0.4)] relative overflow-hidden z-20">
        <!-- Chita Header Strip -->
        <div class="h-4 w-full chita-pattern border-b-4 border-outline"></div>
        <div class="p-margin-edge flex flex-col items-center">
            <!-- Headline -->
            <h1
                class="font-headline-xl text-headline-xl text-primary text-center mb-unit drop-shadow-[2px_2px_0px_#fff]">
                O Registro do Caipira
            </h1>
            <!-- Starter Balance Badge -->
            <div
                class="bg-secondary-container text-on-secondary-container font-label-caps text-label-caps px-4 py-2 rounded-full border-2 border-outline shadow-[2px_2px_0px_0px_rgba(74,55,40,0.4)] rotate-[-2deg] mb-gutter flex items-center gap-2">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">local_activity</span>
                Saldo Inicial: 0 Fichas
            </div>
            <form class="w-full flex flex-col gap-gutter">
                <!-- Avatar Selection (Horizontal Scroll) -->
                <div class="w-full bg-surface-container-low p-4 rounded-lg border-2 border-outline border-dashed">
                    <h2 class="font-headline-md text-headline-md text-on-surface mb-unit text-center">Escolha seu Rosto
                    </h2>
                    <div class="flex gap-4 overflow-x-auto snap-x no-scrollbar pb-2 pt-2 px-2">
                        <!-- Avatar 1 -->
                        <label class="snap-center shrink-0 cursor-pointer group relative">
                            <input checked="" class="peer sr-only" name="avatar" type="radio" value="1" />
                            <div
                                class="w-20 h-20 rounded-full border-4 border-surface bg-surface-container-highest overflow-hidden shadow-[4px_4px_0px_0px_rgba(74,55,40,0.4)] peer-checked:border-primary peer-checked:ring-4 peer-checked:ring-primary-container transition-all group-hover:-translate-y-1">
                                <img alt="Avatar option 1" class="w-full h-full object-cover"
                                    data-alt="A stylized 3D render of a cute cartoon boy wearing a rustic straw hat with frayed edges. He has freckles across his nose and a warm, inviting smile. The lighting is bright and cheerful, reflecting a festive Brazilian Festa Junina atmosphere. The background is a solid warm cream color to match the light-mode UI theme."
                                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuAJfmuyQ6GuB17qQp_tJhut6oOkiZfuCbpK0W5lHjLLwVu1HXMHW4oCIDHxZmgSjeNFQc6pYQ97iPaCcTYjzEOYa0py8_rg4fOuM_8E9hTxWI06qEEq8f0XBUWr24Z1mIjDAs_L-WKMgb_DCmfE7_ZKyRfQQyxt6iLIRFS2gy3cqE7ZNOiah2Gdr5PEo8Zs_BtQkAfdudg4gn95xCiqjhl6Rs4qX6aWgZSXr2ppJmxHTAeO8OhFe8MPNs6mimnEb7XFfLxfhjJQfPqX" />
                            </div>
                        </label>
                        <!-- Avatar 2 -->
                        <label class="snap-center shrink-0 cursor-pointer group relative">
                            <input class="peer sr-only" name="avatar" type="radio" value="2" />
                            <div
                                class="w-20 h-20 rounded-full border-4 border-surface bg-surface-container-highest overflow-hidden shadow-[4px_4px_0px_0px_rgba(74,55,40,0.4)] peer-checked:border-primary peer-checked:ring-4 peer-checked:ring-primary-container transition-all group-hover:-translate-y-1">
                                <img alt="Avatar option 2" class="w-full h-full object-cover"
                                    data-alt="A stylized 3D render of a cute cartoon girl with dark braided pigtails tied with vibrant red ribbons. She is wearing a small straw hat tilted to the side and has a joyful expression with painted cheek flags. The lighting is soft and vibrant, capturing the festive essence of a folk celebration. The overall color palette emphasizes warm, sunny tones."
                                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuA_td3dXgTANfAbVVHgbxEmtviYsoewS3uzDyz8EVzKOekPCLAiFo0peM2PNFBnUMArzJDXXbjATomWglhDgjrDf6xhRP5COiIIQ1OhxBK5HE_q3wFbHDj19v2Xkho0RH4_zUUF9E3PfaI15y6VZxJZjhYH7zVfyR9yGmuZw2RwRXQNvvq7um_aOhudN1_EhccQfEd3XTRP7zp7Ki3WRS_xmPEqosjTbAnbTt8O5gmj-cmgUWQB3Nn2BbxD6b-p0UFtP2yUFHtnJx3k" />
                            </div>
                        </label>
                        <!-- Avatar 3 -->
                        <label class="snap-center shrink-0 cursor-pointer group relative">
                            <input class="peer sr-only" name="avatar" type="radio" value="3" />
                            <div
                                class="w-20 h-20 rounded-full border-4 border-surface bg-surface-container-highest overflow-hidden shadow-[4px_4px_0px_0px_rgba(74,55,40,0.4)] peer-checked:border-primary peer-checked:ring-4 peer-checked:ring-primary-container transition-all group-hover:-translate-y-1">
                                <img alt="Avatar option 3" class="w-full h-full object-cover"
                                    data-alt="A stylized 3D render of an older cartoon man with a large, expressive curled mustache and a classic wide-brimmed straw hat. He is winking and looks friendly and jovial. The scene is lit with warm, bright studio lighting, creating a playful and approachable mood suitable for a rustic festival app. The aesthetic is tactile and handcrafted."
                                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuA8ZLhpHPtWv4itJi8Jn-fnDAZZ6L9zzRZmn04EhH1Bkztax0fIIAE8s-aPke-wtkhTqIqEUjR-qh55KlKBgJP9kV7Z2XwFXcC-jAoozGNgDCQlJfaJ-FPYkOcgV5BU4iudf8p3mxQAl9CPycofbpfz1ccPdu4r8c6k0e6hInpiVUo4uRRM3ZSAPignF3NzLKxZt-3ZZL-f4fzqnpYQ_zvxkWioo41djlpLpkUdVYpWoiwwnjDB4UMBbnRfQrzggV_XR3E5rZkmgPd1" />
                            </div>
                        </label>
                        <!-- Avatar 4 -->
                        <label class="snap-center shrink-0 cursor-pointer group relative">
                            <input class="peer sr-only" name="avatar" type="radio" value="4" />
                            <div
                                class="w-20 h-20 rounded-full border-4 border-surface bg-surface-container-highest overflow-hidden shadow-[4px_4px_0px_0px_rgba(74,55,40,0.4)] peer-checked:border-primary peer-checked:ring-4 peer-checked:ring-primary-container transition-all group-hover:-translate-y-1">
                                <img alt="Avatar option 4" class="w-full h-full object-cover"
                                    data-alt="A stylized 3D render of a young cartoon woman with vibrant floral patterns painted on her face and a sunflower tucked behind her ear. She wears a rustic woven hat. The image exudes a vibrant, energetic mood typical of Brazilian folk festivals. The lighting highlights the textures of the straw and the bright colors of the flowers against a light background."
                                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuAg73wE_PlOgOv5EoSrGEomy9fonh0AGBXJklyczQCGAXD_-J20qREeZ-l0t5Pzr3WUi6GI6WDKqi-SSoiLmHq64ezYW9JIzd8KxeE39LxIwWkUqxt13ZywL5k0pxMhTZzbJS1Dl_eX4kzdzw-DMlWx8bpBlEXeJ17c_7QOJ7IfZMnKkTku4W4S6T41iIzKwWt7yQWYToVvhy0bsIgaSZpRMC-KbC1ZXXZokM1w3wJ56rqw_EW0-hl8-5g-r8cKmKM1vmTSukXW7BJb" />
                            </div>
                        </label>
                    </div>
                </div>
                <!-- Input Fields Grid -->
                <div class="grid grid-cols-1 gap-4">
                    <!-- Apelido Caipira (Highlighted) -->
                    <div
                        class="col-span-1 bg-secondary-fixed-dim/20 p-4 rounded-lg border-2 border-secondary border-dashed relative">
                        <span
                            class="absolute -top-3 right-4 bg-secondary text-on-secondary font-label-caps text-label-caps px-2 py-1 rounded-sm rotate-3 shadow-sm">Mais
                            Importante!</span>
                        <label class="font-label-caps text-label-caps text-on-surface-variant block mb-1"
                            for="nickname">Apelido Caipira</label>
                        <input
                            class="w-full bg-surface-container-lowest border-2 border-outline rounded-md px-4 py-3 font-body-lg text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-container shadow-[inset_2px_2px_4px_rgba(74,55,40,0.1)] transition-colors"
                            id="nickname" placeholder="Ex: Chico Bento, Rosinha..." type="text" />
                    </div>
                    <!-- Real Name -->
                    <div class="col-span-1">
                        <label class="font-label-caps text-label-caps text-on-surface-variant block mb-1"
                            for="realName">Nome Real (Pro correio!)</label>
                        <input
                            class="w-full bg-surface-container-lowest border-2 border-outline rounded-md px-4 py-3 font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-container shadow-[inset_2px_2px_4px_rgba(74,55,40,0.1)] transition-colors"
                            id="realName" placeholder="Seu nome verdadeiro" type="text" />
                    </div>
                    <!-- Email -->
                    <div class="col-span-1">
                        <label class="font-label-caps text-label-caps text-on-surface-variant block mb-1"
                            for="email">E-mail</label>
                        <input
                            class="w-full bg-surface-container-lowest border-2 border-outline rounded-md px-4 py-3 font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-container shadow-[inset_2px_2px_4px_rgba(74,55,40,0.1)] transition-colors"
                            id="email" placeholder="seu@email.com" type="email" />
                    </div>
                    <!-- Password -->
                    <div class="col-span-1">
                        <label class="font-label-caps text-label-caps text-on-surface-variant block mb-1"
                            for="password">Senha (Segredo da vó)</label>
                        <input
                            class="w-full bg-surface-container-lowest border-2 border-outline rounded-md px-4 py-3 font-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary-container shadow-[inset_2px_2px_4px_rgba(74,55,40,0.1)] transition-colors"
                            id="password" placeholder="••••••••" type="password" />
                    </div>
                </div>
                <!-- Submit Button (Wooden Plank) -->
                <button
                    class="mt-4 w-full wood-plank text-on-primary border-4 border-on-surface rounded-md py-4 px-6 font-headline-lg text-headline-lg relative overflow-hidden hover:rotate-1 hover:scale-[1.02] active:scale-95 transition-all shadow-[6px_6px_0px_0px_rgba(74,55,40,0.4)] flex items-center justify-center gap-2 group"
                    type="button">
                    <!-- Nail 1 -->
                    <div
                        class="absolute top-2 left-2 w-2 h-2 rounded-full bg-on-surface shadow-[inset_1px_1px_1px_rgba(255,255,255,0.3)]">
                    </div>
                    <!-- Nail 2 -->
                    <div
                        class="absolute top-2 right-2 w-2 h-2 rounded-full bg-on-surface shadow-[inset_1px_1px_1px_rgba(255,255,255,0.3)]">
                    </div>
                    <!-- Nail 3 -->
                    <div
                        class="absolute bottom-2 left-2 w-2 h-2 rounded-full bg-on-surface shadow-[inset_1px_1px_1px_rgba(255,255,255,0.3)]">
                    </div>
                    <!-- Nail 4 -->
                    <div
                        class="absolute bottom-2 right-2 w-2 h-2 rounded-full bg-on-surface shadow-[inset_1px_1px_1px_rgba(255,255,255,0.3)]">
                    </div>

                    Entrar na Festança!
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform"
                        style="font-variation-settings: 'FILL' 1;" href="HTML/inicio.html">arrow_forward</span>
                </button>
            </form>
            <!-- Login Link -->
            <p class="mt-6 font-body-md text-on-surface-variant">
                Já é de casa? <a
                    class="text-primary font-bold hover:underline underline-offset-4 decoration-2 decoration-secondary"
                    href="HTML/login.html">Puxa uma cadeira e entra!</a>
            </p>
            <div class="mt-6 text-sm text-on-surface-variant text-center space-y-2">
                <p class="font-label-caps text-label-caps text-secondary">Ir para:</p>
                <div class="flex flex-wrap justify-center gap-2">
                    <a class="text-primary hover:text-secondary underline" href="HTML/inicio.html">Início</a>
                    <a class="text-primary hover:text-secondary underline" href="HTML/jogos.html">Jogos</a>
                    <a class="text-primary hover:text-secondary underline" href="HTML/comida.html">Comida</a>
                    <a class="text-primary hover:text-secondary underline" href="HTML/correio.html">Correio</a>
                    <a class="text-primary hover:text-secondary underline" href="HTML/shows.html">Shows</a>
                    <a class="text-primary hover:text-secondary underline" href="HTML/prisao.html">Prisão</a>
                    <a class="text-primary hover:text-secondary underline" href="HTML/vidente.html">Vidente</a>
                </div>
            </div>
        </div>
    </main>
    <script src="HTML/app.js"></script>
</body>

</html>
